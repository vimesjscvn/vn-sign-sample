version: "3.8"

services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: vimes-mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (no TLS - dev only)
      - "8883:8883"   # MQTT over TLS
      - "9001:9001"   # WebSocket (optional, for debugging)
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./config/passwd:/mosquitto/config/passwd:ro
      - ./config/acl:/mosquitto/config/acl:ro
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-p", "1883", "-u", "healthcheck", "-t", "$$SYS/#", "-C", "1", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3
