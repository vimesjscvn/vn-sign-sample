# ─── Vimes MQTT Broker (Local Development) ───────────────────────────────────
# This config runs WITHOUT TLS for local development.
# Production uses mqtt.intellisoftjsc.cloud with Let's Encrypt TLS.

# ─── Listeners ───────────────────────────────────────────────────────────────
# Plain MQTT (dev only - no TLS)
listener 1883
protocol mqtt

# WebSocket (optional - for browser-based debugging tools)
listener 9001
protocol websockets

# ─── Authentication ──────────────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ─── Persistence ─────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ─────────────────────────────────────────────────────────────────
log_dest stdout
log_type all
connection_messages true

# ─── Tuning ──────────────────────────────────────────────────────────────────
max_connections 50
max_packet_size 65536
persistent_client_expiration 1d
