name: Build Sign App (macOS + Windows)

on:
  push:
    branches: [main]
    tags:
      - 'sign-app-v*.*.*'
    paths:
      - 'sign-app/**'
      - 'usb-token-agent/**'
      - '.github/workflows/build-sign-app.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # macOS: Build .pkg (VimesSign + UsbTokenAgent)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write

    env:
      SIGN_APP_NAME: VimesSign
      AGENT_APP_NAME: UsbTokenAgent
      BUNDLE_ID_SIGN: com.vimes.signsample
      BUNDLE_ID_AGENT: com.vimes.usbtokenagent
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/sign-app-v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == sign-app-v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "VERSION=${TAG#sign-app-}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build UsbTokenAgent (Swift)
        working-directory: usb-token-agent/mac
        run: swift build -c release

      - name: Create UsbTokenAgent .app bundle
        working-directory: usb-token-agent/mac
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          APP_DIR="build/${{ env.AGENT_APP_NAME }}.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp .build/release/UsbTokenAgent "$APP_DIR/Contents/MacOS/UsbTokenAgent"
          if [ -f "Resources/appsettings.json" ]; then
            cp Resources/appsettings.json "$APP_DIR/Contents/Resources/"
          else
            cp Resources/appsettings.example.json "$APP_DIR/Contents/Resources/appsettings.json"
          fi
          cp Resources/AppIcon.icns "$APP_DIR/Contents/Resources/"
          [ -d "Resources/pkcs11" ] && cp -R Resources/pkcs11 "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>UsbTokenAgent</string>
            <key>CFBundleIdentifier</key><string>${{ env.BUNDLE_ID_AGENT }}</string>
            <key>CFBundleName</key><string>${{ env.AGENT_APP_NAME }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      - name: Publish VimesSign (osx-arm64)
        run: |
          VER=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          cp sign-app/appsettings.example.json sign-app/appsettings.json
          dotnet publish sign-app/VMSign.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=false -p:Version=$VER \
            -o publish/sign-app

      - name: Create VimesSign .app bundle
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          APP_DIR="publish/${{ env.SIGN_APP_NAME }}.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp -R publish/sign-app/* "$APP_DIR/Contents/MacOS/"
          cp sign-app/Resources/AppIcon.icns "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>VMSign</string>
            <key>CFBundleIdentifier</key><string>${{ env.BUNDLE_ID_SIGN }}</string>
            <key>CFBundleName</key><string>${{ env.SIGN_APP_NAME }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      - name: Import Developer ID certificates
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_P12: ${{ secrets.DEV_ID_APP_P12 }}
          DEV_ID_APP_PASSWORD: ${{ secrets.DEV_ID_APP_PASSWORD }}
          DEV_ID_INSTALLER_P12: ${{ secrets.DEV_ID_INSTALLER_P12 }}
          DEV_ID_INSTALLER_PASSWORD: ${{ secrets.DEV_ID_INSTALLER_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$DEV_ID_APP_P12" | base64 --decode > $RUNNER_TEMP/dev_id_app.p12
          security import $RUNNER_TEMP/dev_id_app.p12 -k $KEYCHAIN_PATH -P "$DEV_ID_APP_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          echo "$DEV_ID_INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/dev_id_installer.p12
          security import $RUNNER_TEMP/dev_id_installer.p12 -k $KEYCHAIN_PATH -P "$DEV_ID_INSTALLER_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
          security list-keychains -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Codesign UsbTokenAgent
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_NAME: ${{ secrets.DEV_ID_APP_NAME }}
        working-directory: usb-token-agent/mac
        run: |
          APP_DIR="build/${{ env.AGENT_APP_NAME }}.app"
          find "$APP_DIR" -name "*.dylib" -exec codesign --force --options runtime --sign "$DEV_ID_APP_NAME" --timestamp {} \;
          codesign --force --options runtime --sign "$DEV_ID_APP_NAME" --timestamp --entitlements entitlements.plist "$APP_DIR"
          codesign --verify --deep --strict "$APP_DIR"

      - name: Codesign VimesSign
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_NAME: ${{ secrets.DEV_ID_APP_NAME }}
        run: |
          codesign --force --deep --options runtime --sign "$DEV_ID_APP_NAME" --timestamp --entitlements sign-app/entitlements.plist "publish/${{ env.SIGN_APP_NAME }}.app"
          codesign -vvv "publish/${{ env.SIGN_APP_NAME }}.app"

      - name: Build .pkg
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_INSTALLER_NAME: ${{ secrets.DEV_ID_INSTALLER_NAME }}
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          PKG_NAME="VimesSign-mac-arm64-${VERSION}.pkg"
          mkdir -p build
          pkgbuild --root "usb-token-agent/mac/build/${{ env.AGENT_APP_NAME }}.app" --identifier "${{ env.BUNDLE_ID_AGENT }}" --version "$VERSION" --install-location "/Applications/${{ env.AGENT_APP_NAME }}.app" build/agent.pkg
          pkgbuild --root "publish/${{ env.SIGN_APP_NAME }}.app" --identifier "${{ env.BUNDLE_ID_SIGN }}" --version "$VERSION" --install-location "/Applications/${{ env.SIGN_APP_NAME }}.app" build/sign.pkg
          productbuild --package build/agent.pkg --package build/sign.pkg --sign "$DEV_ID_INSTALLER_NAME" --timestamp "build/$PKG_NAME"
          echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV

      - name: Notarize .pkg
        if: env.IS_RELEASE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "build/$PKG_NAME" --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait --timeout 600
          xcrun stapler staple "build/$PKG_NAME"

      - name: Upload macOS artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: build/${{ env.PKG_NAME }}

      - name: Install Velopack CLI
        if: env.IS_RELEASE == 'true'
        run: dotnet tool install -g vpk

      - name: Package with Velopack (macOS)
        if: env.IS_RELEASE == 'true'
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          vpk pack \
            --packId VimesSign \
            --packVersion "$VERSION" \
            --packDir publish/sign-app \
            --mainExe VMSign \
            --outputDir build/velopack-mac

      - name: Upload Velopack macOS artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: velopack-mac
          path: build/velopack-mac/*

      - name: Cleanup keychain
        if: env.IS_RELEASE == 'true' && always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true

  # ════════════════════════════════════════════════════════════════════════════
  # Windows: Build Setup.exe (VimesSign + UsbTokenAgent)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/sign-app-v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == sign-app-v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "VERSION=${TAG#sign-app-}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Publish VimesSign (win-x64)
        shell: bash
        run: |
          VER=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          cp sign-app/appsettings.example.json sign-app/appsettings.json
          dotnet publish sign-app/VMSign.csproj \
            -c Release -r win-x64 --self-contained true \
            -p:PublishSingleFile=false -p:PublishReadyToRun=true \
            -p:Version=$VER \
            -o sign-app/build/win-publish

      - name: Copy config template
        shell: pwsh
        run: Copy-Item sign-app\appsettings.example.json sign-app\build\win-publish\appsettings.json

      - name: Download UsbTokenAgent (Windows)
        if: env.IS_RELEASE == 'true'
        shell: pwsh
        run: |
          $cache = Join-Path $env:LOCALAPPDATA ".usb-agent-cache"
          $out = (Resolve-Path "sign-app\build\win-publish").Path
          & "sign-app\build\download-usb-agent.ps1" -Version "latest" -CacheDir $cache -OutDir $out

      - name: Install Velopack CLI
        if: env.IS_RELEASE == 'true'
        shell: bash
        run: dotnet tool install -g vpk

      - name: Package with Velopack (Windows)
        if: env.IS_RELEASE == 'true'
        shell: bash
        run: |
          VER=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          vpk pack \
            --packId VimesSign \
            --packVersion "$VER" \
            --packDir sign-app/build/win-publish \
            --mainExe VMSign.exe \
            --outputDir sign-app/build/velopack-win

      - name: Build Windows Installer (InnoSetup)
        if: env.IS_RELEASE == 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}" -replace '^v', ''
          $env:APP_VERSION = $ver
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "sign-app\installer\windows\setup.iss"

      - name: Upload Windows artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: sign-app/build/VimesSign-win-x64-*-setup.exe

      - name: Upload Velopack Windows artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: velopack-win
          path: sign-app/build/velopack-win/*

  # ════════════════════════════════════════════════════════════════════════════
  # Create GitHub Release (after both builds)
  # ════════════════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/sign-app-v') || github.event_name == 'workflow_dispatch'
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == sign-app-v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "VERSION=${TAG#sign-app-}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-setup
          path: dist/

      - name: Download Velopack macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: velopack-mac
          path: dist/

      - name: Download Velopack Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: velopack-win
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "VimesSign ${{ steps.ver.outputs.VERSION }}"
          files: dist/*
          body: |
            ## VimesSign ${{ steps.ver.outputs.VERSION }}

            Ứng dụng ký số đa nền tảng — bao gồm VimesSign + UsbTokenAgent.

            ### 🔄 Tự động cập nhật (Auto-Update)
            Từ phiên bản này, ứng dụng sẽ **tự động kiểm tra và cập nhật** khi có bản mới.
            Bạn không cần tải lại thủ công — chỉ cần khởi động lại ứng dụng khi được thông báo.

            ### macOS (Apple Silicon)
            1. Tải `VimesSign-mac-arm64-*.pkg`
            2. Nhấp đúp để cài đặt (đã notarize, không cảnh báo Gatekeeper)
            3. Cả hai ứng dụng cài vào `/Applications/`

            ### Windows (x64)
            1. Tải `VimesSign-win-x64-*-setup.exe`
            2. Chạy trình cài đặt → Next → Install
            3. Ứng dụng cài vào `C:\Program Files\VimesSign\`

            ### Lần chạy đầu tiên
            - **macOS**: Cấu hình tại `~/.config/vimes-sign/appsettings.json`
            - **Windows**: Chỉnh sửa `appsettings.json` trong thư mục cài đặt

            ### Yêu cầu
            - macOS 14+ (Sonoma) hoặc Windows 10/11 x64
            - USB Token có driver PKCS#11
