name: Release Multiplatform Samples

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Publish WinForms Sample
        shell: bash
        run: |
          dotnet publish sign-app/win/WinFormsSample.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:UseSdkSource=false \
            -o ./publish-winforms

      - name: Copy config template (WinForms)
        shell: pwsh
        run: Copy-Item sign-app\win\appsettings.example.json publish-winforms\appsettings.json

      - name: Download Windows UsbTokenAgent (WinForms)
        shell: pwsh
        run: |
          $cache = Join-Path $env:LOCALAPPDATA ".usb-agent-cache"
          $out   = (Resolve-Path "publish-winforms").Path
          & "sign-app\win\build\download-usb-agent.ps1" `
              -Version "latest" `
              -CacheDir $cache `
              -OutDir $out

      - name: Zip WinForms Release
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          Compress-Archive -Path publish-winforms\* -DestinationPath "VimesSignSDK-WinForms-$ver.zip"

      - name: Build and Publish Avalonia Windows Sample
        shell: bash
        run: |
          dotnet publish sign-app/mac/VimesSignSample.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true \
            -p:UseSdkSource=false \
            -o ./publish-avalonia-win

      - name: Copy config template (Avalonia Win)
        shell: pwsh
        run: Copy-Item sign-app\mac\appsettings.example.json publish-avalonia-win\appsettings.json

      - name: Download Windows UsbTokenAgent (Avalonia Win)
        shell: pwsh
        run: |
          $cache = Join-Path $env:LOCALAPPDATA ".usb-agent-cache"
          $out   = (Resolve-Path "publish-avalonia-win").Path
          & "sign-app\win\build\download-usb-agent.ps1" `
              -Version "latest" `
              -CacheDir $cache `
              -OutDir $out

      - name: Zip Avalonia Windows Release
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          Compress-Archive -Path publish-avalonia-win\* -DestinationPath "VimesSignSDK-Studio-Windows-$ver.zip"

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-zips
          path: VimesSignSDK-*.zip

  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Publish Avalonia Mac arm64
        shell: bash
        run: |
          dotnet publish sign-app/mac/VimesSignSample.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:UseSdkSource=false \
            -o ./publish-osx-arm64

      - name: Copy config template (Mac arm64)
        run: cp sign-app/mac/appsettings.example.json ./publish-osx-arm64/appsettings.json

      - name: Zip Mac arm64 Release
        run: |
          cd publish-osx-arm64
          zip -r ../VimesSignSDK-Studio-macOS-arm64-${{ steps.ver.outputs.VERSION }}.zip *
          cd ..

      - name: Build and Publish Avalonia Mac x64
        shell: bash
        run: |
          dotnet publish sign-app/mac/VimesSignSample.csproj \
            -c Release \
            -r osx-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:UseSdkSource=false \
            -o ./publish-osx-x64

      - name: Copy config template (Mac x64)
        run: cp sign-app/mac/appsettings.example.json ./publish-osx-x64/appsettings.json

      - name: Zip Mac x64 Release
        run: |
          cd publish-osx-x64
          zip -r ../VimesSignSDK-Studio-macOS-x64-${{ steps.ver.outputs.VERSION }}.zip *
          cd ..

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-zips
          path: VimesSignSDK-*.zip

  create-github-release:
    needs: [release-windows, release-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-zips
          path: ./dist

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-zips
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.VERSION }}
          name: "Vimes SignSDK Multiplatform Studio ${{ steps.ver.outputs.VERSION }}"
          files: ./dist/VimesSignSDK-*.zip
          body: |
            ## Hướng dẫn cài đặt / Installation Guide

            ### Windows
            1. Tải file **`VimesSignSDK-Studio-Windows-[VERSION].zip`** (phiên bản cross-platform hiện đại) hoặc **`VimesSignSDK-WinForms-[VERSION].zip`** (phiên bản gốc) và giải nén.
            2. Điền thông tin cấu hình vào file **`appsettings.json`**.
            3. Chạy file **`VimesSignSample.exe`** hoặc **`WinFormsSample.exe`**.

            ### macOS (Apple Silicon & Intel)
            1. Tải file **`VimesSignSDK-Studio-macOS-arm64-[VERSION].zip`** (cho M1/M2/M3 chip) hoặc **`VimesSignSDK-Studio-macOS-x64-[VERSION].zip`** (cho Intel chip) và giải nén.
            2. Điền thông tin cấu hình vào file **`appsettings.json`**.
            3. Phân quyền thực thi và chạy ứng dụng:
               ```bash
               chmod +x VimesSignSample
               ./VimesSignSample
               ```
               *(Lưu ý: Để sử dụng USB Token trên macOS, vui lòng tải và cài đặt thêm **UsbTokenAgent-mac-arm64-signed.pkg** từ thư mục `usb-token-agent-mac/dist`)*
