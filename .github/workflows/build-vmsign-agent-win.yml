name: Release VMSignAgent

on:
  push:
    tags:
      - 'vmsign-agent-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  PROJECT: vmsign-agent/win/VMSignAgent.csproj

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Strip 'vmsign-agent-' prefix, e.g. vmsign-agent-v1.2.0 → v1.2.0
            TAG="${GITHUB_REF_NAME}"
            echo "VERSION=${TAG#vmsign-agent-}" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore "${{ env.PROJECT }}"

      - name: Build Release
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}" -replace '^v', ''
          dotnet build "${{ env.PROJECT }}" -c Release --no-restore -p:Version=$ver

      - name: Collect artifacts
        shell: pwsh
        run: |
          $out = "vmsign-agent\win\bin\Release\net461"
          New-Item -ItemType Directory -Force vmsign-agent\win\build\publish | Out-Null
          New-Item -ItemType Directory -Force publish | Out-Null
          Get-ChildItem $out -File | Where-Object { $_.Extension -notin @('.pdb', '.xml') } |
            Copy-Item -Destination vmsign-agent\win\build\publish\
          Get-ChildItem $out -File | Where-Object { $_.Extension -notin @('.pdb', '.xml') } |
            Copy-Item -Destination publish\
          Copy-Item "vmsign-agent\win\app.config" vmsign-agent\win\build\publish\app.config.example
          Copy-Item "vmsign-agent\win\app.config" publish\app.config.example

      - name: Zip release
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}"
          Compress-Archive -Path publish\* -DestinationPath "VMSignAgent-$ver.zip"

      - name: Build Windows Installer (InnoSetup)
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.VERSION }}" -replace '^v', ''
          $env:APP_VERSION = $ver
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "vmsign-agent\win\installer\setup.iss"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "VMSignAgent ${{ steps.ver.outputs.VERSION }}"
          files: |
            VMSignAgent-*.zip
            vmsign-agent/win/build/VMSignAgent-win-x64-*-setup.exe
          body: |
            ## VMSignAgent ${{ steps.ver.outputs.VERSION }}

            Local USB Token signing service for WinFormsSample (net4.6.1, no .NET runtime install needed on Windows 10/11).

            ### Usage
            Distributed automatically — WinFormsSample downloads this at build time.
            Manual install: extract zip, run VMSignAgent.exe (runs silently in background).

            ### Endpoints
            | Method | Path | Description |
            |--------|------|-------------|
            | POST | `/certs` | List certificates in Windows Personal store |
            | POST | `/login` | Find certificate by serial / CN |
            | POST | `/signHash` | Sign a SHA-256 digest (PKCS#11 if PIN set, CNG otherwise) |

            ### Requirements
            - Windows 10/11 x64 (.NET Framework 4.6.1 pre-installed)
            - USB Token with driver installed (bit4id or compatible)
