name: Build Sign App (macOS PKG)

on:
  push:
    branches: [main]
    tags:
      - 'sign-app-v*.*.*'
    paths:
      - 'mac/sign-app-mac/**'
      - 'mac/usb-token-agent-mac/**'
      - 'nuget.config'
      - '.github/workflows/build-sign-app-mac.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  build-sign-app:
    runs-on: macos-14
    permissions:
      contents: write

    env:
      SIGN_APP_NAME: VimesSign
      AGENT_APP_NAME: UsbTokenAgent
      BUNDLE_ID_SIGN: com.vimes.signsample
      BUNDLE_ID_AGENT: com.vimes.usbtokenagent
      PROJECT_DIR: mac/sign-app-mac
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/sign-app-v') || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == sign-app-v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "VERSION=${TAG#sign-app-}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # ══════════════════════════════════════════════════════════════════════
      # BUILD: UsbTokenAgent (Swift)
      # ══════════════════════════════════════════════════════════════════════
      - name: Build UsbTokenAgent (Swift)
        working-directory: mac/usb-token-agent-mac
        run: swift build -c release

      - name: Create UsbTokenAgent .app bundle
        working-directory: mac/usb-token-agent-mac
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          APP_DIR="build/${{ env.AGENT_APP_NAME }}.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp .build/release/UsbTokenAgent "$APP_DIR/Contents/MacOS/UsbTokenAgent"
          if [ -f "Resources/appsettings.json" ]; then
            cp Resources/appsettings.json "$APP_DIR/Contents/Resources/"
          else
            cp Resources/appsettings.example.json "$APP_DIR/Contents/Resources/appsettings.json"
          fi
          cp Resources/AppIcon.icns "$APP_DIR/Contents/Resources/"
          [ -d "Resources/pkcs11" ] && cp -R Resources/pkcs11 "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>UsbTokenAgent</string>
            <key>CFBundleIdentifier</key><string>${{ env.BUNDLE_ID_AGENT }}</string>
            <key>CFBundleName</key><string>${{ env.AGENT_APP_NAME }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      # ══════════════════════════════════════════════════════════════════════
      # BUILD: VimesSign (.NET Avalonia)
      # ══════════════════════════════════════════════════════════════════════
      - name: Publish VimesSign (.NET)
        run: |
          VER=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          dotnet publish ${{ env.PROJECT_DIR }}/VimesSignSample.csproj \
            -c Release -r osx-arm64 --self-contained true \
            -p:PublishSingleFile=false -p:Version=$VER \
            -o publish/sign-app

      - name: Create VimesSign .app bundle
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          APP_DIR="publish/${{ env.SIGN_APP_NAME }}.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"

          cp -R publish/sign-app/* "$APP_DIR/Contents/MacOS/"

          # Copy app icon
          cp mac/sign-app-mac/Resources/AppIcon.icns "$APP_DIR/Contents/Resources/"

          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>VimesSignSample</string>
            <key>CFBundleIdentifier</key><string>${{ env.BUNDLE_ID_SIGN }}</string>
            <key>CFBundleName</key><string>${{ env.SIGN_APP_NAME }}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>14.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF

      # ══════════════════════════════════════════════════════════════════════
      # SIGN + PACKAGE (only on release tags)
      # ══════════════════════════════════════════════════════════════════════
      - name: Import Developer ID certificates
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_P12: ${{ secrets.DEV_ID_APP_P12 }}
          DEV_ID_APP_PASSWORD: ${{ secrets.DEV_ID_APP_PASSWORD }}
          DEV_ID_INSTALLER_P12: ${{ secrets.DEV_ID_INSTALLER_P12 }}
          DEV_ID_INSTALLER_PASSWORD: ${{ secrets.DEV_ID_INSTALLER_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "$DEV_ID_APP_P12" | base64 --decode > $RUNNER_TEMP/dev_id_app.p12
          security import $RUNNER_TEMP/dev_id_app.p12 \
            -k $KEYCHAIN_PATH -P "$DEV_ID_APP_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild

          echo "$DEV_ID_INSTALLER_P12" | base64 --decode > $RUNNER_TEMP/dev_id_installer.p12
          security import $RUNNER_TEMP/dev_id_installer.p12 \
            -k $KEYCHAIN_PATH -P "$DEV_ID_INSTALLER_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild

          security list-keychains -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Codesign UsbTokenAgent
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_NAME: ${{ secrets.DEV_ID_APP_NAME }}
        working-directory: mac/usb-token-agent-mac
        run: |
          APP_DIR="build/${{ env.AGENT_APP_NAME }}.app"
          find "$APP_DIR" -name "*.dylib" -exec \
            codesign --force --options runtime --sign "$DEV_ID_APP_NAME" --timestamp {} \;
          codesign --force --options runtime \
            --sign "$DEV_ID_APP_NAME" --timestamp \
            --entitlements entitlements.plist "$APP_DIR"
          codesign --verify --deep --strict "$APP_DIR"

      - name: Codesign VimesSign
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_APP_NAME: ${{ secrets.DEV_ID_APP_NAME }}
        run: |
          APP_DIR="publish/${{ env.SIGN_APP_NAME }}.app"
          codesign --force --deep --options runtime \
            --sign "$DEV_ID_APP_NAME" --timestamp \
            --entitlements mac/sign-app-mac/entitlements.plist "$APP_DIR"
          codesign -vvv "$APP_DIR"

      - name: Build combined .pkg (VimesSign + UsbTokenAgent)
        if: env.IS_RELEASE == 'true'
        env:
          DEV_ID_INSTALLER_NAME: ${{ secrets.DEV_ID_INSTALLER_NAME }}
        run: |
          VERSION=$(echo "${{ steps.ver.outputs.VERSION }}" | sed 's/^v//')
          PKG_NAME="VimesSign-mac-arm64-${VERSION}.pkg"
          mkdir -p build

          # Component 1: UsbTokenAgent → /Applications/UsbTokenAgent.app
          pkgbuild \
            --root "mac/usb-token-agent-mac/build/${{ env.AGENT_APP_NAME }}.app" \
            --identifier "${{ env.BUNDLE_ID_AGENT }}" \
            --version "$VERSION" \
            --install-location "/Applications/${{ env.AGENT_APP_NAME }}.app" \
            build/agent.pkg

          # Component 2: VimesSign → /Applications/VimesSign.app
          pkgbuild \
            --root "publish/${{ env.SIGN_APP_NAME }}.app" \
            --identifier "${{ env.BUNDLE_ID_SIGN }}" \
            --version "$VERSION" \
            --install-location "/Applications/${{ env.SIGN_APP_NAME }}.app" \
            build/sign.pkg

          # Combined signed product pkg
          productbuild \
            --package build/agent.pkg \
            --package build/sign.pkg \
            --sign "$DEV_ID_INSTALLER_NAME" \
            --timestamp \
            "build/$PKG_NAME"

          echo "PKG_PATH=build/$PKG_NAME" >> $GITHUB_ENV
          echo "PKG_NAME=$PKG_NAME" >> $GITHUB_ENV

      - name: Notarize .pkg
        if: env.IS_RELEASE == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$PKG_PATH" \
            --apple-id "$APPLE_ID" --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --timeout 600
          xcrun stapler staple "$PKG_PATH"

      - name: Upload PKG artifact
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}
          path: ${{ env.PKG_PATH }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "VimesSign ${{ steps.ver.outputs.VERSION }}"
          files: ${{ env.PKG_PATH }}
          body: |
            ## VimesSign ${{ steps.ver.outputs.VERSION }}

            macOS signing suite — installs both apps:
            - **VimesSign** — Desktop signing UI (Avalonia .NET 8)
            - **UsbTokenAgent** — Menu bar USB token agent (Swift native)

            ### Install
            1. Download the `.pkg` file
            2. Double-click to install (notarized, no Gatekeeper warnings)
            3. Both apps install to `/Applications/`

            ### First Run
            - Put your config at `~/.config/vimes-sign/appsettings.json`
            - Launch **VimesSign** from Applications
            - **UsbTokenAgent** launches automatically when USB signing is used

            ### Requirements
            - macOS 14+ (Sonoma or later)
            - Apple Silicon (arm64)
            - USB Token with PKCS#11 driver

      - name: Cleanup keychain
        if: env.IS_RELEASE == 'true' && always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
